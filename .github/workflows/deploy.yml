name: Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /notepad
          NEXT_PUBLIC_SITE_URL: https://guerrerocarlos.w7s.cloud/notepad/

      - name: Deploy to W7S
        uses: w7s-io/w7s-cloud@v1
        with:
          token: ${{ github.token }}
